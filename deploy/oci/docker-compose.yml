services:
  mysql:
    image: mysql:8.4
    container_name: ledgervault-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: time_bound_wallet_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: ledgervault-backend
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      DB_URL: jdbc:mysql://mysql:3306/time_bound_wallet_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
      PORT: 8080
    ports:
      - "8080:8080"

volumes:
  mysql_data:
